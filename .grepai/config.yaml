version: 1
embedder:
    provider: ollama
    model: nomic-embed-text
    endpoint: http://localhost:11434
    dimensions: 768
    parallelism: 4
store:
    backend: gob
chunking:
    size: 512
    overlap: 50
watch:
    debounce_ms: 500
    last_index_time: 2026-03-11T14:23:35.853032-05:00
    rpg_persist_interval_ms: 1000
    rpg_derived_debounce_ms: 300
    rpg_full_reconcile_interval_sec: 300
    rpg_max_dirty_files_per_batch: 128
search:
    boost:
        enabled: true
        penalties:
            - pattern: .obsidian/plugins
              factor: 0.2
            - pattern: .obsidian/themes
              factor: 0.1
            - pattern: .sisyphus/plans
              factor: 0.5
            - pattern: .sisyphus/evidence
              factor: 0.7
            - pattern: .sisyphus/notepads
              factor: 0.6
            - pattern: .claude/worktrees
              factor: 0.3
            - pattern: .git
              factor: 0.1
        bonuses:
            - pattern: /projects/
              factor: 1.4
            - pattern: /research/
              factor: 1.4
            - pattern: /dated-notes/
              factor: 1.3
            - pattern: /commands/
              factor: 1.2
            - pattern: /templates/
              factor: 1.1
            - pattern: /skills/
              factor: 1.1
            - pattern: /docs/
              factor: 1.2
    hybrid:
        enabled: true
        k: 60
trace:
    mode: fast
    enabled_languages:
        - .go
        - .js
        - .ts
        - .jsx
        - .tsx
        - .py
        - .php
        - .c
        - .h
        - .cpp
        - .hpp
        - .cc
        - .cxx
        - .rs
        - .zig
        - .cs
        - .java
        - .fs
        - .fsx
        - .fsi
        - .pas
        - .dpr
    exclude_patterns:
        - '*_test.go'
        - '*.spec.ts'
        - '*.spec.js'
        - '*.test.ts'
        - '*.test.js'
        - __tests__/*
rpg:
    enabled: false
    feature_mode: local
    drift_threshold: 0.35
    max_traversal_depth: 3
    llm_provider: ollama
    llm_endpoint: http://localhost:11434/v1
    llm_timeout_ms: 8000
    feature_group_strategy: sample
update:
    check_on_startup: false
ignore:
    - .git
    - .grepai
    - node_modules
    - vendor
    - bin
    - dist
    - __pycache__
    - .venv
    - venv
    - .idea
    - .vscode
    - target
    - .zig-cache
    - zig-out
    - qdrant_storage
    - .obsidian/plugins
    - .obsidian/themes
    - .trash
